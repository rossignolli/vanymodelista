<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo escuro com cantos arredondados -->
  <rect width="100" height="100" rx="20" fill="#1C1917"/>

  <!-- Borda dourada sutil -->
  <rect x="4" y="4" width="92" height="92" rx="17" fill="none" stroke="#B8896A" stroke-width="1" opacity="0.35"/>

  <!-- Letra V — traço esquerdo (mais espesso) -->
  <polygon points="14,20 26,20 50,74 38,74" fill="#FAF8F4"/>

  <!-- Letra V — traço direito (mais fino, elegante) -->
  <polygon points="86,20 74,20 50,74 62,74" fill="#B8896A"/>
</svg>
