<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#1C1917"/>

  <!-- Decorative thin border -->
  <rect x="5" y="5" width="90" height="90" rx="14" fill="none" stroke="#B8896A" stroke-width="0.8" opacity="0.4"/>

  <!-- Letter V — custom serif italic path -->
  <!-- Left stroke of V (thick, angled) -->
  <polygon
    points="16,18  28,18  52,72  46,82  20,26"
    fill="#B8896A"
  />
  <!-- Right stroke of V (thin, angled) — italic lean -->
  <polygon
    points="78,18  84,18  58,82  46,82  68,26"
    fill="#C9A96E"
  />

  <!-- Subtle serif details at top -->
  <rect x="13" y="18" width="18" height="3" rx="1.5" fill="#B8896A"/>
  <rect x="75" y="18" width="12" height="3" rx="1.5" fill="#C9A96E"/>
</svg>
